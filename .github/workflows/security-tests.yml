name: 安全测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 启动开发服务器
        run: |
          JWT_SECRET="ci-test-secret-$(openssl rand -hex 16)-abcdefgh1234567890" \
          npx wrangler dev --port 8787 --local &
          echo $! > /tmp/wrangler.pid
        env:
          CLOUDFLARE_ACCOUNT_ID: ci-placeholder

      - name: 等待服务就绪
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8787/api/version; then
              echo "服务已就绪"
              break
            fi
            echo "等待中... ($i/30)"
            sleep 2
          done

      - name: 运行安全测试
        run: python3 scripts/test_security.py

      - name: 停止服务器
        if: always()
        run: kill $(cat /tmp/wrangler.pid) 2>/dev/null || true
